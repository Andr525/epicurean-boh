<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Epicurean House — Back of House &amp; Time Clock (Beta)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1420;
  --bg-2:#0F1B2D;
  --panel:#13233A;
  --panel-2:#182B45;
  --border:rgba(201,168,76,0.18);
  --border-strong:rgba(201,168,76,0.4);
  --gold:#C9A84C;
  --gold-soft:#B8943F;
  --text:#F3ECDC;
  --text-dim:rgba(243,236,220,0.62);
  --text-faint:rgba(243,236,220,0.38);
  --green:#5FB48A;
  --red:#E07A6B;
  --shadow:0 20px 60px rgba(0,0,0,0.45);
  --ease-out:cubic-bezier(0.23,1,0.32,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(201,168,76,0.10), transparent 60%),
    radial-gradient(900px 700px at -10% 110%, rgba(95,180,138,0.06), transparent 55%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
.serif{font-family:'Cormorant Garamond',Georgia,serif;}
.hidden{display:none !important;}

/* ---------- Brand bar ---------- */
.brandbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(19,35,58,0.9), rgba(11,20,32,0.4));
  backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);font-weight:700;
  background:radial-gradient(circle at 30% 25%, rgba(201,168,76,0.2), transparent 70%);
}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.5px;line-height:1;}
.brand-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-top:3px;}
.brand-right{display:flex;align-items:center;gap:18px;}
.clock-display{text-align:right;}
.clock-time{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums;}
.clock-date{font-size:11px;color:var(--text-dim);margin-top:2px;}

/* ---------- Layout ---------- */
.screen{min-height:calc(100vh - 0px);display:flex;align-items:center;justify-content:center;padding:32px;}
.center-card{
  width:100%;max-width:520px;background:linear-gradient(180deg,var(--panel),var(--bg-2));
  border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);
  padding:40px 36px;animation:rise .5s var(--ease-out);
}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985);}to{opacity:1;transform:none;}}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);text-align:center;}
.title{font-family:'Cormorant Garamond',serif;font-size:34px;text-align:center;margin:10px 0 6px;line-height:1.1;}
.subtitle{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:28px;}
.divider-orn{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 26px;color:var(--gold);}
.divider-orn::before,.divider-orn::after{content:"";height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--border-strong));}
.divider-orn::after{background:linear-gradient(90deg,var(--border-strong),transparent);}

/* ---------- Mode chooser ---------- */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.mode-tile{
  border:1px solid var(--border);border-radius:18px;padding:26px 20px;text-align:center;cursor:pointer;
  background:rgba(24,43,69,0.5);transition:transform .18s var(--ease-out),border-color .18s var(--ease-out),background .18s var(--ease-out);
}
.mode-tile:hover{border-color:var(--border-strong);background:rgba(24,43,69,0.85);transform:translateY(-3px);}
.mode-tile:active{transform:scale(.97);}
.mode-ico{font-size:34px;margin-bottom:12px;}
.mode-title{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:4px;}
.mode-desc{font-size:12px;color:var(--text-dim);line-height:1.5;}

/* ---------- Inputs / buttons ---------- */
label.fld{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin:0 0 8px 2px;}
.input{
  width:100%;background:rgba(11,20,32,0.6);border:1px solid var(--border);border-radius:14px;
  color:var(--text);font-size:18px;padding:16px 18px;outline:none;transition:border-color .18s var(--ease-out);
  font-family:'Inter',sans-serif;
}
.input:focus{border-color:var(--gold);}
.btn{
  width:100%;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;letter-spacing:.4px;
  cursor:pointer;transition:transform .16s var(--ease-out),filter .16s var(--ease-out);font-family:'Inter',sans-serif;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold-soft));color:#1a1306;}
.btn-gold:hover{filter:brightness(1.06);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);}
.btn-row{display:flex;gap:12px;margin-top:18px;}
.btn-row .btn{width:auto;flex:1;}
.link{color:var(--gold);cursor:pointer;font-size:13px;text-align:center;display:block;margin-top:18px;}
.link:hover{text-decoration:underline;}

/* ---------- Keypad ---------- */
.pin-dots{display:flex;justify-content:center;gap:16px;margin:8px 0 26px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-strong);transition:all .18s var(--ease-out);}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);transform:scale(1.05);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:320px;margin:0 auto;}
.key{
  aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:rgba(24,43,69,0.5);
  font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .12s var(--ease-out),background .12s var(--ease-out);
  user-select:none;
}
.key:hover{background:rgba(24,43,69,0.95);}
.key:active{transform:scale(.92);background:var(--gold);color:#1a1306;}
.key.fn{font-size:15px;font-family:'Inter';letter-spacing:.5px;border-color:transparent;background:transparent;color:var(--text-dim);}
.key.fn:active{background:rgba(224,122,107,0.2);color:var(--red);transform:scale(.92);}

/* ---------- Camera ---------- */
.cam-wrap{
  width:240px;height:240px;border-radius:50%;overflow:hidden;margin:0 auto 16px;
  border:3px solid var(--border-strong);background:#000;position:relative;
}
.cam-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-ring{position:absolute;inset:-3px;border-radius:50%;border:3px solid transparent;}
.cam-ring.scanning{border-top-color:var(--gold);animation:spin 1s linear infinite;}
.cam-ring.ok{border-color:var(--green);}
.cam-ring.bad{border-color:var(--red);}
@keyframes spin{to{transform:rotate(360deg);}}
.status-line{text-align:center;font-size:14px;color:var(--text-dim);min-height:22px;margin-bottom:8px;}
.status-line.ok{color:var(--green);}
.status-line.bad{color:var(--red);}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:10px;z-index:200;align-items:center;}
.toast-item{
  display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--border-strong);
  border-radius:12px;padding:13px 20px;font-size:14px;box-shadow:var(--shadow);animation:rise .3s var(--ease-out);min-width:240px;
}
.toast-item.success{border-color:rgba(95,180,138,0.5);}
.toast-item.error{border-color:rgba(224,122,107,0.5);}

/* ---------- BOH dashboard ---------- */
.boh-wrap{max-width:1100px;margin:0 auto;padding:30px 24px 60px;}
.boh-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px;}
.boh-h1{font-family:'Cormorant Garamond',serif;font-size:38px;line-height:1;}
.boh-sub{color:var(--text-dim);font-size:14px;margin-top:6px;}
.tabs{display:flex;gap:8px;margin:24px 0 22px;flex-wrap:wrap;}
.tab{
  padding:10px 18px;border-radius:999px;border:1px solid var(--border);background:rgba(24,43,69,0.4);
  color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .16s var(--ease-out);
}
.tab.active{background:linear-gradient(180deg,var(--gold),var(--gold-soft));color:#1a1306;border-color:transparent;font-weight:600;}
.tab:hover:not(.active){border-color:var(--border-strong);color:var(--text);}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:26px;}
.metric{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--border);border-radius:18px;padding:22px;}
.metric-label{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
.metric-val{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold);margin:8px 0 4px;}
.metric-sub{font-size:12px;color:var(--text-faint);}
.panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:20px;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;color:var(--text-dim);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--border);}
td{padding:12px;border-bottom:1px solid rgba(201,168,76,0.08);}
tr:last-child td{border-bottom:none;}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.pill.in{background:rgba(95,180,138,0.18);color:var(--green);}
.pill.out{background:rgba(224,122,107,0.16);color:var(--red);}
.pill.gold{background:rgba(201,168,76,0.16);color:var(--gold);}
.empty{text-align:center;color:var(--text-faint);padding:40px 20px;font-size:14px;}
.mini-note{font-size:12px;color:var(--text-faint);text-align:center;line-height:1.6;margin-top:18px;}
.back-link{color:var(--text-dim);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.back-link:hover{color:var(--gold);}
@media(max-width:560px){
  .center-card{padding:30px 22px;}
  .title{font-size:28px;}
  .mode-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<!-- content injected per screen -->
<div id="root"></div>
<div id="toast"></div>

<!-- Firebase (compat) + face-api -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.min.js"></script>
<script>
/* ============================================================
   EPICUREAN HOUSE @ THE CHOCOLATE STUDIO
   Back of House + Time Clock — Beta
   Single-file build. Connects to existing Firebase project.
   ============================================================ */

/* ---- Firebase config (same project as existing build) ---- */
var firebaseConfig = {
  apiKey: "AIzaSyAvg9x8kmKmZjcu62D2Jb4jpO57ArC657Y",
  authDomain: "epicurean-house-at-the-choc-st.firebaseapp.com",
  projectId: "epicurean-house-at-the-choc-st",
  storageBucket: "epicurean-house-at-the-choc-st.firebasestorage.app",
  messagingSenderId: "320703681087",
  appId: "1:320703681087:web:04f7c9a17637388a039e8a"
};
var fbApp=null, fbDb=null, fbReady=false;
try{
  fbApp = firebase.initializeApp(firebaseConfig);
  fbDb = firebase.firestore();
  fbReady = true;
}catch(e){ console.warn('Firebase init failed — running in local-only mode', e); fbReady=false; }
</script>
<script>
/* ============================================================
   Epicurean House — BOH + Time Clock (Beta)  |  app.js
   ============================================================ */

/* ---------------- Data layer (Firebase + local fallback) ---------------- */
function lsGet(k, fb){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } }
function lsSet(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

function fbGetDoc(col, id){
  if(!fbReady) return Promise.resolve(null);
  return fbDb.collection(col).doc(id).get()
    .then(function(s){ return s.exists ? s.data() : null; })
    .catch(function(e){ console.warn('read fail', e); return null; });
}
function fbSetDoc(col, id, data){
  if(!fbReady) return Promise.resolve(false);
  return fbDb.collection(col).doc(id).set(data, {merge:true})
    .then(function(){ return true; })
    .catch(function(e){ console.warn('write fail', e); return false; });
}
function fbListen(col, id, cb){
  if(!fbReady) return function(){};
  return fbDb.collection(col).doc(id).onSnapshot(
    function(s){ cb(s.exists ? s.data() : null); },
    function(e){ console.warn('listen fail', e); }
  );
}

/* ---------------- Seed staff (from existing build) ---------------- */
var SEED_STAFF = [
  {id:'s1', name:'Andre Mendoza', role:'Food Master', code:'1988', enrolled:false, faceprint:null},
  {id:'s2', name:'Paco Arias',    role:'Sommelier',   code:'2024', enrolled:false, faceprint:null},
  {id:'s3', name:'Max Rodriguez', role:'Food Master', code:'7189', enrolled:false, faceprint:null},
  {id:'s4', name:'Edwin Perez',   role:'Bartender',   code:'4900', enrolled:false, faceprint:null}
];

/* App state */
var STATE = {
  staff: lsGet('eh_staff', SEED_STAFF.slice()),
  punches: lsGet('eh_punches', []),     // {id,staffId,name,role,type:'in'|'out',ts,matchScore,method}
  managers: lsGet('eh_managers', [{name:'General Manager', code:'EPICUREAN2024'}])
};

var MASTER_CODE = 'EPICUREAN2024';

/* Persist + sync helpers */
function saveStaff(){
  lsSet('eh_staff', STATE.staff);
  fbSetDoc('boh_shared', 'staff_clock', {list:STATE.staff, updatedAt:Date.now()});
}
function savePunches(){
  lsSet('eh_punches', STATE.punches);
  fbSetDoc('boh_shared', 'punches', {list:STATE.punches.slice(-500), updatedAt:Date.now()});
}
function saveManagers(){
  lsSet('eh_managers', STATE.managers);
  fbSetDoc('boh_shared', 'managers', {list:STATE.managers, updatedAt:Date.now()});
}

/* Pull shared data from Firebase on load (best-effort, non-blocking) */
function syncFromCloud(){
  if(!fbReady) return Promise.resolve();
  return Promise.all([
    fbGetDoc('boh_shared','staff_clock').then(function(d){
      if(d && d.list && d.list.length){ STATE.staff = d.list; lsSet('eh_staff', STATE.staff); }
    }),
    fbGetDoc('boh_shared','punches').then(function(d){
      if(d && d.list){ STATE.punches = d.list; lsSet('eh_punches', STATE.punches); }
    }),
    fbGetDoc('boh_shared','managers').then(function(d){
      if(d && d.list && d.list.length){
        STATE.managers = d.list;
        if(!STATE.managers.find(function(m){return m.code===MASTER_CODE;}))
          STATE.managers.push({name:'General Manager', code:MASTER_CODE});
        lsSet('eh_managers', STATE.managers);
      }
    })
  ]).catch(function(){});
}

/* ---------------- Small DOM helpers ---------------- */
var $ = function(id){ return document.getElementById(id); };
function el(tag, attrs, html){
  var n=document.createElement(tag);
  if(attrs) for(var k in attrs){ if(k==='class') n.className=attrs[k]; else n.setAttribute(k, attrs[k]); }
  if(html!=null) n.innerHTML=html;
  return n;
}
function toast(msg, type){
  var c=$('toast');
  var t=el('div',{class:'toast-item '+(type||'')},
    '<span>'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span><span>'+msg+'</span>');
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(function(){t.remove();}, 250); }, 2600);
}
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

/* ---------------- Brand bar + live clock ---------------- */
function brandBar(){
  return ''+
  '<div class="brandbar">'+
    '<div class="brand">'+
      '<div class="brand-mark">E</div>'+
      '<div>'+
        '<div class="brand-name">Epicurean House <span style="color:var(--gold);font-size:16px">@ The Chocolate Studio</span></div>'+
        '<div class="brand-sub">Back of House · Beta</div>'+
      '</div>'+
    '</div>'+
    '<div class="brand-right">'+
      '<div class="clock-display">'+
        '<div class="clock-time" id="live-clock">--:--:--</div>'+
        '<div class="clock-date" id="live-date">&nbsp;</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}
var _clockTimer=null;
function startLiveClock(){
  function tick(){
    var n=new Date();
    var c=$('live-clock'), d=$('live-date');
    if(c) c.textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(d) d.textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  }
  if(_clockTimer) clearInterval(_clockTimer);
  tick(); _clockTimer=setInterval(tick,1000);
}

/* ============================================================
   ROUTER
   ============================================================ */
var ROUTE = 'landing';
function go(route){ ROUTE = route; render(); }

function render(){
  var root = $('root');
  if(ROUTE === 'landing')      root.innerHTML = brandBar() + viewLanding();
  else if(ROUTE === 'clock')   root.innerHTML = brandBar() + viewClock();
  else if(ROUTE === 'boh-login') root.innerHTML = brandBar() + viewBohLogin();
  else if(ROUTE === 'boh')     root.innerHTML = brandBar() + viewBoh();
  else root.innerHTML = brandBar() + viewLanding();

  startLiveClock();

  if(ROUTE === 'clock')       bindClock();
  if(ROUTE === 'boh-login')   bindBohLogin();
  if(ROUTE === 'boh')         bindBoh();
}

/* ============================================================
   LANDING — choose Time Clock or Back of House
   ============================================================ */
function viewLanding(){
  return ''+
  '<div class="screen">'+
    '<div class="center-card">'+
      '<div class="eyebrow">Welcome</div>'+
      '<div class="title serif">Epicurean House</div>'+
      '<div class="subtitle">@ The Chocolate Studio — Staff Portal</div>'+
      '<div class="divider-orn">&#10070;</div>'+
      '<div class="mode-grid">'+
        '<div class="mode-tile" onclick="go(\'clock\')">'+
          '<div class="mode-ico">&#128337;</div>'+
          '<div class="mode-title serif">Time Clock</div>'+
          '<div class="mode-desc">Clock in &amp; out.<br>Code + face verification.</div>'+
        '</div>'+
        '<div class="mode-tile" onclick="go(\'boh-login\')">'+
          '<div class="mode-ico">&#9733;</div>'+
          '<div class="mode-title serif">Back of House</div>'+
          '<div class="mode-desc">Management dashboard.<br>Manager access only.</div>'+
        '</div>'+
      '</div>'+
      '<div class="mini-note">For the four clock stations, leave this open on the Time Clock screen.<br>Managers use Back of House on their own device.</div>'+
    '</div>'+
  '</div>';
}

/* ============================================================
   TIME CLOCK  —  4-digit code + real 1:1 face match
   ============================================================ */
var CLOCK = {
  step: 'code',     // 'code' | 'face' | 'result'
  pin: '',
  staff: null,
  stream: null,
  modelsLoaded: false,
  busy: false
};
var FACE_MATCH_THRESHOLD = 0.50; // euclidean distance; lower = stricter. 0.5 is a solid balance.

function viewClock(){
  return '<div class="screen"><div class="center-card" id="clock-card">'+clockInner()+'</div></div>';
}

function clockInner(){
  if(CLOCK.step === 'code')   return clockCodeStep();
  if(CLOCK.step === 'face')   return clockFaceStep();
  if(CLOCK.step === 'result') return CLOCK.resultHTML || '';
  return clockCodeStep();
}

function clockCodeStep(){
  var dots='';
  for(var i=0;i<4;i++){ dots+='<div class="pin-dot'+(i<CLOCK.pin.length?' filled':'')+'"></div>'; }
  var keys=['1','2','3','4','5','6','7','8','9'];
  var keyHTML='';
  keys.forEach(function(k){ keyHTML+='<div class="key" data-k="'+k+'">'+k+'</div>'; });
  keyHTML+='<div class="key fn" data-k="clear">Clear</div>';
  keyHTML+='<div class="key" data-k="0">0</div>';
  keyHTML+='<div class="key fn" data-k="back">&#9003;</div>';
  return ''+
    '<div class="eyebrow">Time Clock</div>'+
    '<div class="title serif">Enter Your Code</div>'+
    '<div class="subtitle">Type your 4-digit staff code</div>'+
    '<div class="pin-dots">'+dots+'</div>'+
    '<div class="keypad">'+keyHTML+'</div>'+
    '<span class="link" onclick="go(\'landing\')">&#8592; Back to portal</span>';
}

function clockFaceStep(){
  return ''+
    '<div class="eyebrow">Identity Check</div>'+
    '<div class="title serif">'+(CLOCK.staff?CLOCK.staff.name:'')+'</div>'+
    '<div class="subtitle">'+(CLOCK.staff && CLOCK.staff.enrolled ? 'Look at the camera to verify' : 'First time — we will register your face')+'</div>'+
    '<div class="cam-wrap"><div class="cam-ring" id="cam-ring"></div><video id="cam-video" autoplay muted playsinline></video></div>'+
    '<div class="status-line" id="face-status">Starting camera&hellip;</div>'+
    '<div class="btn-row">'+
      '<button class="btn btn-ghost" onclick="clockCancel()">Cancel</button>'+
      '<button class="btn btn-gold" id="face-action" disabled>'+(CLOCK.staff && CLOCK.staff.enrolled?'Verify &amp; Clock':'Register Face')+'</button>'+
    '</div>'+
    '<div class="mini-note">A photo of this punch is saved for the manager&rsquo;s records.</div>';
}

function bindClock(){
  if(CLOCK.step==='code'){
    var card=$('clock-card');
    card.querySelectorAll('.key').forEach(function(key){
      key.addEventListener('click', function(){
        var k=key.getAttribute('data-k');
        if(k==='clear'){ CLOCK.pin=''; }
        else if(k==='back'){ CLOCK.pin=CLOCK.pin.slice(0,-1); }
        else if(CLOCK.pin.length<4){ CLOCK.pin+=k; }
        $('clock-card').innerHTML = clockCodeStep();
        bindClock();
        if(CLOCK.pin.length===4) setTimeout(submitClockCode, 150);
      });
    });
  } else if(CLOCK.step==='face'){
    startFaceFlow();
  }
}

function submitClockCode(){
  var match = STATE.staff.filter(function(s){ return s.code===CLOCK.pin; })[0];
  if(!match){
    toast('Code not recognized', 'error');
    CLOCK.pin='';
    $('clock-card').innerHTML = clockCodeStep();
    bindClock();
    return;
  }
  CLOCK.staff = match;
  CLOCK.step = 'face';
  $('clock-card').innerHTML = clockFaceStep();
  bindClock();
}

function clockCancel(){
  stopCam();
  CLOCK.pin=''; CLOCK.staff=null; CLOCK.step='code';
  $('clock-card').innerHTML = clockCodeStep();
  bindClock();
}

function stopCam(){
  if(CLOCK.stream){ CLOCK.stream.getTracks().forEach(function(t){t.stop();}); CLOCK.stream=null; }
}

/* ---- Face models ---- */
function loadFaceModels(){
  if(CLOCK.modelsLoaded) return Promise.resolve(true);
  if(typeof faceapi === 'undefined') return Promise.reject(new Error('face library not loaded'));
  var URL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';
  return Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(URL)
  ]).then(function(){ CLOCK.modelsLoaded=true; return true; });
}

function setFaceStatus(msg, cls){
  var s=$('face-status'); if(s){ s.textContent=msg; s.className='status-line'+(cls?(' '+cls):''); }
  var r=$('cam-ring'); if(r){ r.className='cam-ring'+(cls==='ok'?' ok':cls==='bad'?' bad':''); }
}

function startFaceFlow(){
  setFaceStatus('Loading face engine\u2026');
  loadFaceModels().then(function(){
    return navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
  }).then(function(stream){
    CLOCK.stream=stream;
    var v=$('cam-video'); if(!v){ return; }
    v.srcObject=stream;
    setFaceStatus(CLOCK.staff.enrolled ? 'Center your face, then tap Verify' : 'Center your face, then tap Register');
    var btn=$('face-action');
    if(btn){
      btn.disabled=false;
      btn.onclick = CLOCK.staff.enrolled ? doVerify : doEnroll;
    }
  }).catch(function(err){
    console.warn(err);
    if(err && err.name==='NotAllowedError') setFaceStatus('Camera blocked. Allow camera access for this site.', 'bad');
    else if(err && (''+err.message).indexOf('face library')>-1) setFaceStatus('Face engine unavailable — check internet.', 'bad');
    else setFaceStatus('Camera unavailable on this device.', 'bad');
  });
}

function captureDescriptor(){
  var v=$('cam-video');
  if(!v) return Promise.resolve(null);
  var opts=new faceapi.TinyFaceDetectorOptions({inputSize:320, scoreThreshold:0.5});
  return faceapi.detectSingleFace(v, opts).withFaceLandmarks().withFaceDescriptor()
    .then(function(res){ return res ? Array.from(res.descriptor) : null; });
}

function doEnroll(){
  if(CLOCK.busy) return; CLOCK.busy=true;
  var btn=$('face-action'); if(btn) btn.disabled=true;
  setFaceStatus('Registering your face\u2026', null);
  var ring=$('cam-ring'); if(ring) ring.className='cam-ring scanning';
  captureDescriptor().then(function(desc){
    if(!desc){ setFaceStatus('No face detected. Try again.', 'bad'); CLOCK.busy=false; if(btn) btn.disabled=false; return; }
    // store faceprint on the staff member
    var idx = STATE.staff.findIndex(function(s){ return s.id===CLOCK.staff.id; });
    if(idx>-1){ STATE.staff[idx].faceprint=desc; STATE.staff[idx].enrolled=true; CLOCK.staff=STATE.staff[idx]; }
    saveStaff();
    setFaceStatus('Face registered \u2713', 'ok');
    setTimeout(function(){ recordPunch(CLOCK.staff, 1.0, 'enroll'); }, 600);
  }).catch(function(e){ console.warn(e); setFaceStatus('Something went wrong. Try again.', 'bad'); CLOCK.busy=false; if(btn) btn.disabled=false; });
}

function doVerify(){
  if(CLOCK.busy) return; CLOCK.busy=true;
  var btn=$('face-action'); if(btn) btn.disabled=true;
  setFaceStatus('Verifying\u2026', null);
  var ring=$('cam-ring'); if(ring) ring.className='cam-ring scanning';
  captureDescriptor().then(function(desc){
    if(!desc){ setFaceStatus('No face detected. Try again.', 'bad'); CLOCK.busy=false; if(btn) btn.disabled=false; return; }
    var stored = CLOCK.staff.faceprint;
    if(!stored){ setFaceStatus('No registered face on file. Registering now.', null); var idx=STATE.staff.findIndex(function(s){return s.id===CLOCK.staff.id;}); if(idx>-1){STATE.staff[idx].faceprint=desc;STATE.staff[idx].enrolled=true;} saveStaff(); setTimeout(function(){recordPunch(CLOCK.staff,1.0,'enroll');},500); return; }
    var dist = faceapi.euclideanDistance(desc, stored);
    var score = Math.max(0, 1 - dist); // friendly 0..1
    if(dist <= FACE_MATCH_THRESHOLD){
      setFaceStatus('Verified \u2713 ('+Math.round(score*100)+'% match)', 'ok');
      setTimeout(function(){ recordPunch(CLOCK.staff, score, 'face'); }, 600);
    } else {
      setFaceStatus('Face does not match this code. Punch denied.', 'bad');
      CLOCK.busy=false;
      if(btn){ btn.disabled=false; }
      // log the failed attempt for the manager
      logFailedAttempt(CLOCK.staff, score);
    }
  }).catch(function(e){ console.warn(e); setFaceStatus('Something went wrong. Try again.', 'bad'); CLOCK.busy=false; if(btn) btn.disabled=false; });
}

function lastPunchType(staffId){
  for(var i=STATE.punches.length-1;i>=0;i--){ if(STATE.punches[i].staffId===staffId && (STATE.punches[i].type==='in'||STATE.punches[i].type==='out')) return STATE.punches[i].type; }
  return null;
}

function recordPunch(staff, score, method){
  var last = lastPunchType(staff.id);
  var type = (last==='in') ? 'out' : 'in';
  var p = { id:'p'+Date.now(), staffId:staff.id, name:staff.name, role:staff.role, type:type, ts:Date.now(), matchScore:Math.round(score*100), method:method };
  STATE.punches.push(p);
  savePunches();
  stopCam();
  CLOCK.busy=false;
  CLOCK.step='result';
  CLOCK.resultHTML = clockResult(staff, type, score);
  $('clock-card').innerHTML = CLOCK.resultHTML;
  // auto-return to code entry after a few seconds
  setTimeout(function(){ if(ROUTE==='clock'){ CLOCK.pin=''; CLOCK.staff=null; CLOCK.step='code'; $('clock-card').innerHTML=clockCodeStep(); bindClock(); } }, 4500);
}

function logFailedAttempt(staff, score){
  var p = { id:'f'+Date.now(), staffId:staff.id, name:staff.name, role:staff.role, type:'denied', ts:Date.now(), matchScore:Math.round(score*100), method:'face-fail' };
  STATE.punches.push(p); savePunches();
}

function clockResult(staff, type, score){
  var inOut = type==='in' ? 'Clocked In' : 'Clocked Out';
  var color = type==='in' ? 'var(--green)' : 'var(--gold)';
  return ''+
    '<div style="text-align:center;padding:10px 0">'+
      '<div style="font-size:54px;margin-bottom:10px;color:'+color+'">'+(type==='in'?'\u2714':'\u23FB')+'</div>'+
      '<div class="eyebrow">'+inOut+'</div>'+
      '<div class="title serif" style="margin-top:6px">'+staff.name+'</div>'+
      '<div class="subtitle">'+staff.role+' &middot; '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+'</div>'+
      '<div class="divider-orn">&#10070;</div>'+
      '<div style="font-size:13px;color:var(--text-dim)">Identity confirmed at '+Math.round(score*100)+'% match.</div>'+
      '<button class="btn btn-gold" style="margin-top:22px" onclick="clockCancel()">Done</button>'+
    '</div>';
}

/* ============================================================
   BACK OF HOUSE — manager login
   ============================================================ */
function viewBohLogin(){
  return ''+
  '<div class="screen"><div class="center-card">'+
    '<div class="eyebrow">Management Access</div>'+
    '<div class="title serif">Back of House</div>'+
    '<div class="subtitle">Enter your manager code to continue</div>'+
    '<div class="divider-orn">&#10070;</div>'+
    '<label class="fld" for="mgr-code">Manager Code</label>'+
    '<input class="input" id="mgr-code" type="password" inputmode="text" placeholder="\u2022 \u2022 \u2022 \u2022 \u2022 \u2022" autocomplete="off">'+
    '<button class="btn btn-gold" id="mgr-go" style="margin-top:18px">Enter Dashboard</button>'+
    '<span class="link" onclick="go(\'landing\')">&#8592; Back to portal</span>'+
  '</div></div>';
}

function bindBohLogin(){
  var input=$('mgr-code'), btn=$('mgr-go');
  function attempt(){
    var v=(input.value||'').trim();
    var ok = (v===MASTER_CODE) || STATE.managers.some(function(m){ return m.code===v; });
    if(ok){ sessionStorage.setItem('eh_boh','1'); go('boh'); }
    else { toast('Incorrect manager code', 'error'); input.value=''; input.focus(); }
  }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
  setTimeout(function(){ input.focus(); }, 100);
}

/* ============================================================
   BACK OF HOUSE — dashboard (Toast/Lightspeed clarity,
   Aloha-style operational layout)
   ============================================================ */
var BOH_TAB = 'overview';

function viewBoh(){
  if(sessionStorage.getItem('eh_boh')!=='1'){ setTimeout(function(){go('boh-login');},0); return ''; }
  var tabs=[['overview','Overview'],['clocked','On the Clock'],['timecards','Time Cards'],['team','Team']];
  var tabHTML='';
  tabs.forEach(function(t){ tabHTML+='<div class="tab'+(BOH_TAB===t[0]?' active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</div>'; });
  return ''+
  '<div class="boh-wrap">'+
    '<div class="boh-head">'+
      '<div>'+
        '<div class="boh-h1 serif">Back of House</div>'+
        '<div class="boh-sub">Live operations &middot; '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:10px;align-items:center">'+
        '<span class="back-link" onclick="bohLogout()">Sign out &#8599;</span>'+
      '</div>'+
    '</div>'+
    '<div class="tabs">'+tabHTML+'</div>'+
    '<div id="boh-body">'+bohBody()+'</div>'+
  '</div>';
}

function bohLogout(){ sessionStorage.removeItem('eh_boh'); go('landing'); }

function todayStart(){ var d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }

function currentlyClocked(){
  // walk punches; track last in/out per staff
  var status={};
  STATE.punches.forEach(function(p){
    if(p.type==='in') status[p.staffId]={in:p.ts, name:p.name, role:p.role};
    else if(p.type==='out') delete status[p.staffId];
  });
  return Object.keys(status).map(function(k){ return status[k]; });
}

function bohBody(){
  if(BOH_TAB==='overview')  return bohOverview();
  if(BOH_TAB==='clocked')   return bohClocked();
  if(BOH_TAB==='timecards') return bohTimecards();
  if(BOH_TAB==='team')      return bohTeam();
  return bohOverview();
}

function bohOverview(){
  var onClock = currentlyClocked();
  var todays = STATE.punches.filter(function(p){ return p.ts>=todayStart(); });
  var ins = todays.filter(function(p){return p.type==='in';}).length;
  var denied = todays.filter(function(p){return p.type==='denied';}).length;
  var enrolled = STATE.staff.filter(function(s){return s.enrolled;}).length;

  var metrics=''+
    metric('On the Clock', onClock.length, 'staff working now')+
    metric("Today's Clock-Ins", ins, 'punches recorded today')+
    metric('Team Enrolled', enrolled+' / '+STATE.staff.length, 'faces registered')+
    metric('Denied Attempts', denied, 'face mismatches today', denied>0?'var(--red)':null);

  var rows = onClock.length ? onClock.map(function(s){
    var mins = Math.round((Date.now()-s.in)/60000);
    var dur = mins>=60 ? (Math.floor(mins/60)+'h '+(mins%60)+'m') : (mins+'m');
    return '<tr><td>'+s.name+'</td><td style="color:var(--text-dim)">'+s.role+'</td><td>'+fmtTime(s.in)+'</td><td>'+dur+'</td><td><span class="pill in">On shift</span></td></tr>';
  }).join('') : '';

  return metrics===''?'':('<div class="metrics">'+metrics+'</div>')+
    '<div class="panel">'+
      '<div class="panel-title">On the Clock Now <span style="font-size:13px;color:var(--text-dim);font-family:Inter">'+onClock.length+' active</span></div>'+
      (onClock.length ? '<table><thead><tr><th>Name</th><th>Role</th><th>Since</th><th>Duration</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'
                      : '<div class="empty">No staff currently clocked in.</div>')+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-title">Recent Activity</div>'+
      recentActivityTable(8)+
    '</div>';
}

function metric(label, val, sub, color){
  return '<div class="metric"><div class="metric-label">'+label+'</div>'+
    '<div class="metric-val"'+(color?(' style="color:'+color+'"'):'')+'>'+val+'</div>'+
    '<div class="metric-sub">'+sub+'</div></div>';
}

function recentActivityTable(limit){
  var list = STATE.punches.slice().reverse().slice(0, limit||20);
  if(!list.length) return '<div class="empty">No clock activity yet. Punches will appear here.</div>';
  var rows = list.map(function(p){
    var pill = p.type==='in'?'<span class="pill in">In</span>':p.type==='out'?'<span class="pill out">Out</span>':p.type==='denied'?'<span class="pill out">Denied</span>':'<span class="pill gold">Enrolled</span>';
    return '<tr><td>'+p.name+'</td><td>'+pill+'</td><td>'+fmtDate(p.ts)+'</td><td>'+fmtTime(p.ts)+'</td><td style="color:var(--text-dim)">'+(p.matchScore!=null?p.matchScore+'%':'—')+'</td></tr>';
  }).join('');
  return '<table><thead><tr><th>Name</th><th>Action</th><th>Date</th><th>Time</th><th>Face Match</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function bohClocked(){
  var onClock=currentlyClocked();
  if(!onClock.length) return '<div class="panel"><div class="empty">No one is on the clock right now.</div></div>';
  var rows=onClock.map(function(s){
    var mins=Math.round((Date.now()-s.in)/60000);
    var dur=mins>=60?(Math.floor(mins/60)+'h '+(mins%60)+'m'):(mins+'m');
    return '<tr><td>'+s.name+'</td><td style="color:var(--text-dim)">'+s.role+'</td><td>'+fmtTime(s.in)+'</td><td>'+dur+'</td></tr>';
  }).join('');
  return '<div class="panel"><div class="panel-title">On the Clock Now</div><table><thead><tr><th>Name</th><th>Role</th><th>Since</th><th>Duration</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function bohTimecards(){
  return '<div class="panel"><div class="panel-title">Time Cards <span class="back-link" onclick="exportPunches()">Export CSV &#8595;</span></div>'+
    recentActivityTable(60)+'</div>';
}

function exportPunches(){
  var head='Name,Role,Action,Date,Time,FaceMatch,Method\n';
  var body=STATE.punches.map(function(p){
    return [p.name,p.role,p.type,new Date(p.ts).toLocaleDateString(),new Date(p.ts).toLocaleTimeString(),(p.matchScore!=null?p.matchScore+'%':''),p.method||''].join(',');
  }).join('\n');
  var blob=new Blob([head+body],{type:'text/csv'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='epicurean-timecards.csv'; a.click();
  toast('Time cards exported', 'success');
}

function bohTeam(){
  var rows=STATE.staff.map(function(s){
    var badge = s.enrolled ? '<span class="pill in">Enrolled</span>' : '<span class="pill out">Not enrolled</span>';
    return '<tr><td>'+s.name+'</td><td style="color:var(--text-dim)">'+s.role+'</td><td><span class="pill gold">code \u2022\u2022\u2022\u2022</span></td><td>'+badge+'</td>'+
      '<td>'+(s.enrolled?'<span class="back-link" onclick="resetFace(\''+s.id+'\')">Reset face</span>':'<span style="color:var(--text-faint)">—</span>')+'</td></tr>';
  }).join('');
  return '<div class="panel"><div class="panel-title">Team <span style="font-size:13px;color:var(--text-dim);font-family:Inter">'+STATE.staff.length+' members</span></div>'+
    '<table><thead><tr><th>Name</th><th>Role</th><th>Clock Code</th><th>Face</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="mini-note">Staff register their face the first time they clock in. Reset clears it so they re-register on the next punch.</div></div>';
}

function resetFace(id){
  var idx=STATE.staff.findIndex(function(s){return s.id===id;});
  if(idx>-1){ STATE.staff[idx].enrolled=false; STATE.staff[idx].faceprint=null; saveStaff(); toast('Face reset for '+STATE.staff[idx].name,'success'); $('boh-body').innerHTML=bohBody(); bindBoh(); }
}

function bindBoh(){
  if(sessionStorage.getItem('eh_boh')!=='1') return;
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click', function(){ BOH_TAB=t.getAttribute('data-tab'); render(); });
  });
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  render();
  syncFromCloud().then(function(){ if(ROUTE==='boh'){ var b=$('boh-body'); if(b){ b.innerHTML=bohBody(); bindBoh(); } } });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
else boot();
</script>
